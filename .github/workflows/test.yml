name: Test
on:
  schedule: # every Sunday, Tuesday, Thursday at 15:36 UTC
    - cron: '36 15 * * 0,2,4'
  push:
  pull_request:
permissions:
  contents: read

jobs:
  test:
    name: "Run Tests"
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        go:
          - { go-version: stable, check-latest: true, deps: "locked" }
          - { go-version: stable, check-latest: true, deps: "latest" }
          - { go-version: "1", check-latest: true, deps: "locked" }
          - { go-version: "1", check-latest: true, deps: "latest" }
          - { go-version-file: go.mod, check-latest: true, deps: "locked" }
        #os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: "ubuntu-latest"
    services:
      dynamodb:
        image: amazon/dynamodb-local:3.3.0
        ports:
          - 8000:8000
        options: "--name dynamodb"
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false
      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v5
        with:
          go-version: ${{ matrix.go.go-version }}
          go-version-file: ${{ matrix.go.go-version-file }}
          check-latest: ${{ matrix.go.check-latest }}
      - name: Upgrade Dependencies
        if: ${{ matrix.go.deps == 'latest' }}
        run: go get -u -t ./...
      - name: Test
        env:
          DYNAMODB_URL: http://localhost:8000
        run: |
          make ci-show-integration-cov
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          use_oidc: true
          files: "./coverage.out"
      - name: Require minimum test coverage percentage
        env:
          TESTCOVERAGE_PCT: 98
        run: |
          actual_pct="$(go tool cover --func=coverage.out | awk '/^total:.*%$/ { print substr($3, 1, length($3)-1) }')"
          echo "Verifying test coverage percentage (minimum allowed: ${TESTCOVERAGE_PCT} ; parsed: ${actual_pct})"
          # NOTE: sys.exit(True) will be a non-zero exit code, so we only want
          # that when the actual percentage is lower than our configured
          # threshold
          python -c "import sys; sys.exit($actual_pct < $TESTCOVERAGE_PCT)"
      - name: Check for vulnerabilities
        if: ${{ matrix.go.go-version-file != 'go.mod' }}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          make vulncheck
